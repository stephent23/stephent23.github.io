<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="960" height="520" fill="#ffffff"/>

  <!-- Title -->

<text x="60" y="58" font-size="26" font-weight="700" fill="#0f172a">Three jobs in the AI-ready SOC</text>
<text x="60" y="88" font-size="16" fill="#64748b">Most of the confusion comes from blurring these together. Keep them separate.</text>

  <!-- Card: Automation -->

  <g>
    <rect x="60" y="124" width="260" height="276" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="60" y="124" width="260" height="6" rx="3" fill="#64748b"/>
    <text x="84" y="172" font-size="22" font-weight="700" fill="#0f172a">Automation</text>
    <text x="84" y="198" font-size="15" font-style="italic" fill="#64748b">handles the certain</text>
    <line x1="84" y1="216" x2="296" y2="216" stroke="#e2e8f0" stroke-width="1"/>
    <text font-size="14.5" fill="#475569">
      <tspan x="84" y="248">Known, repeatable steps with a</tspan>
      <tspan x="84" y="270">predictable outcome.</tspan>
      <tspan x="84" y="306">Enrichment, ticket creation,</tspan>
      <tspan x="84" y="328">blocking known-bad indicators.</tspan>
      <tspan x="84" y="364" font-style="italic" fill="#64748b">Fast, reliable, cheap.</tspan>
    </text>
  </g>

  <!-- Card: AI -->

  <g>
    <rect x="350" y="124" width="260" height="276" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="350" y="124" width="260" height="6" rx="3" fill="#0ea5e9"/>
    <text x="374" y="172" font-size="22" font-weight="700" fill="#0f172a">AI</text>
    <text x="374" y="198" font-size="15" font-style="italic" fill="#0284c7">handles the variable</text>
    <line x1="374" y1="216" x2="586" y2="216" stroke="#e2e8f0" stroke-width="1"/>
    <text font-size="14.5" fill="#475569">
      <tspan x="374" y="248">Picks and runs the right</tspan>
      <tspan x="374" y="270">codified steps for the alert</tspan>
      <tspan x="374" y="292">in front of it.</tspan>
      <tspan x="374" y="328">Reasons over your context</tspan>
      <tspan x="374" y="350">and makes sense of the results.</tspan>
    </text>
  </g>

  <!-- Card: People -->

  <g>
    <rect x="640" y="124" width="260" height="276" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="640" y="124" width="260" height="6" rx="3" fill="#f59e0b"/>
    <text x="664" y="172" font-size="22" font-weight="700" fill="#0f172a">People</text>
    <text x="664" y="198" font-size="15" font-style="italic" fill="#d97706">handle the novel</text>
    <line x1="664" y1="216" x2="876" y2="216" stroke="#e2e8f0" stroke-width="1"/>
    <text font-size="14.5" fill="#475569">
      <tspan x="664" y="248">Genuinely new attacker</tspan>
      <tspan x="664" y="270">behaviour, ambiguity and</tspan>
      <tspan x="664" y="292">business judgement.</tspan>
      <tspan x="664" y="328">Deciding what gets codified</tspan>
      <tspan x="664" y="350">for AI to use next.</tspan>
    </text>
  </g>

  <!-- Spectrum -->

  <line x1="84" y1="452" x2="852" y2="452" stroke="#cbd5e1" stroke-width="2"/>
  <polygon points="852,452 842,447 842,457" fill="#cbd5e1"/>
  <circle cx="190" cy="452" r="4" fill="#64748b"/>
  <circle cx="480" cy="452" r="4" fill="#0ea5e9"/>
  <circle cx="770" cy="452" r="4" fill="#f59e0b"/>
  <text x="190" y="482" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">CERTAIN</text>
  <text x="480" y="482" font-size="13" font-weight="600" fill="#0284c7" text-anchor="middle">VARIABLE</text>
  <text x="770" y="482" font-size="13" font-weight="600" fill="#d97706" text-anchor="middle">NOVEL</text>
</svg>
